apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: readout
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-api
  template:
    metadata:
      labels:
        app: user-api
    spec:
      containers:
        - name: user-api
          image: ${ECR_REGISTRY}/readout-user-api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: readout-config
            - secretRef:
                name: readout-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
